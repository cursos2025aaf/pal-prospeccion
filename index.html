<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="google-places-key" content="TU_API_KEY_AQUI">
<title>PAL SRL — Prospección Territorial</title>
<link href="https://fonts.googleapis.com/css2?family=Oswald:wght@400;600;700&family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@500;600&display=swap" rel="stylesheet">
<style>
*{box-sizing:border-box;margin:0;padding:0}
html,body{height:100%;background:#F0EBE3;font-family:'Inter',sans-serif;color:#111827}
#root{display:flex;flex-direction:column;min-height:100vh}

/* HEADER */
header{background:#0A2540;border-bottom:4px solid #0EA5E9;padding:18px 4%;display:flex;align-items:center;gap:20px}
.h-logo img{height:80px;display:block}
.h-sep{width:2px;height:72px;background:rgba(14,165,233,0.35);margin:0 8px;flex-shrink:0}
.h-titles{flex:1}
.h-titles h1{font-family:'Oswald',sans-serif;font-weight:700;font-size:34px;color:#fff;text-transform:uppercase;letter-spacing:1px;line-height:1;display:flex;align-items:center;gap:14px;flex-wrap:wrap}
.h-rombo{width:32px;height:32px;background:#0EA5E9;transform:rotate(45deg);display:flex;align-items:center;justify-content:center;flex-shrink:0}
.h-rombo svg{transform:rotate(-45deg);width:16px;height:16px}
.h-sub{font-family:'JetBrains Mono',monospace;font-size:15px;color:#38BDF8;letter-spacing:2px;text-transform:uppercase;margin-top:10px;font-weight:500}
.h-btns{display:flex;gap:12px;margin-left:auto;flex-shrink:0}
.h-btn{background:transparent;border:2px solid #0EA5E9;color:#fff;padding:14px 30px;font-family:'Oswald',sans-serif;font-size:17px;font-weight:600;text-transform:uppercase;letter-spacing:1px;cursor:pointer;border-radius:4px;transition:background 0.2s}
.h-btn:hover{background:#0EA5E9}

/* SEARCHBAR */
.searchbar{background:#0F3460;border-bottom:2px solid #0EA5E9;padding:20px 4%;display:flex;gap:16px;align-items:flex-end;flex-wrap:wrap}
.sf{display:flex;flex-direction:column;gap:7px}
.sf label{font-family:'JetBrains Mono',monospace;font-size:12px;text-transform:uppercase;letter-spacing:1.5px;color:rgba(255,255,255,0.85);font-weight:600}
.sf input,.sf select{background:#0A2540;border:1.5px solid rgba(14,165,233,0.5);color:#fff;padding:14px 16px;font-size:16px;font-family:'Inter',sans-serif;border-radius:3px;outline:none;transition:border-color 0.15s}
.sf input{min-width:280px}.sf select{min-width:300px;cursor:pointer}
.sf.sm input{min-width:90px;width:90px}
.sf input:focus,.sf select:focus{border-color:#0EA5E9}
.sf input::placeholder{color:rgba(255,255,255,0.3)}
.sf select option{background:#0A2540;color:#fff}
.btn-buscar{background:#0EA5E9;color:#fff;border:none;padding:15px 34px;font-family:'Oswald',sans-serif;font-weight:700;font-size:19px;text-transform:uppercase;letter-spacing:1px;cursor:pointer;border-radius:3px;transition:background 0.15s;white-space:nowrap}
.btn-buscar:hover{background:#0284C7}
.btn-buscar:disabled{background:#374151;cursor:not-allowed}

/* MAIN */
main{flex:1;padding:32px 4%;background:#F0EBE3}

/* Empty */
.empty{text-align:center;padding:48px 20px}
.empty svg{width:56px;height:56px;margin:0 auto 18px;color:#C9B99A;display:block}
.empty h2{font-family:'Oswald',sans-serif;font-size:28px;color:#374151;text-transform:uppercase;letter-spacing:0.5px;margin-bottom:12px}
.empty p{font-size:17px;color:#6B7280;max-width:500px;margin:0 auto;line-height:1.75}

/* Loading */
.loading{text-align:center;padding:56px 20px}
.loading-bar{width:260px;height:5px;background:#D6CEC4;border-radius:3px;overflow:hidden;margin:0 auto 16px}
.loading-bar span{display:block;height:100%;width:40%;background:#0EA5E9;animation:sw 1.1s ease-in-out infinite}
@keyframes sw{0%{margin-left:-40%}100%{margin-left:100%}}
.loading p{font-family:'JetBrains Mono',monospace;font-size:13px;color:#6B7280;text-transform:uppercase;letter-spacing:1px}

/* Error */
.err{background:#FEE2E2;border:1.5px solid #EF4444;color:#7F1D1D;padding:14px 18px;border-radius:4px;margin-bottom:20px;font-size:15px}

/* Results */
.res-hdr{display:flex;justify-content:space-between;align-items:center;margin-bottom:22px;padding-bottom:16px;border-bottom:2px solid #0A2540}
.res-hdr h2{font-family:'Oswald',sans-serif;font-size:26px;color:#0A2540;text-transform:uppercase;letter-spacing:0.5px}
.res-hdr h2 b{color:#0EA5E9}
.btn-csv{background:transparent;border:2px solid #0A2540;color:#0A2540;padding:10px 20px;font-family:'JetBrains Mono',monospace;font-size:13px;text-transform:uppercase;letter-spacing:0.5px;cursor:pointer;border-radius:3px;transition:all 0.15s}
.btn-csv:hover{background:#0A2540;color:#F0EBE3}
.res-layout{display:grid;grid-template-columns:1fr 360px;gap:24px;align-items:start}
@media(max-width:900px){.res-layout{grid-template-columns:1fr}}

/* Mapa */
.map-box{background:#fff;border:1.5px solid #D6CEC4;border-radius:4px;overflow:hidden}
#map{width:100%;height:500px}
.map-legend{display:flex;gap:16px;padding:12px 16px;background:#F8F5F0;border-top:1px solid #D6CEC4;flex-wrap:wrap}
.leg-item{display:flex;align-items:center;gap:7px;font-size:13px;color:#4B5563}
.leg-dot{width:12px;height:12px;border-radius:50%;flex-shrink:0}

/* Zonas */
.zones-col{display:flex;flex-direction:column;gap:12px;max-height:580px;overflow-y:auto}
.z-card{background:#fff;border:1.5px solid #D6CEC4;border-radius:4px;overflow:hidden;cursor:pointer;transition:border-color 0.15s}
.z-card:hover,.z-card.on{border-color:#0EA5E9;border-width:2px}
.z-hdr{background:#0A2540;padding:11px 14px;display:flex;align-items:center;gap:10px}
.z-num{width:28px;height:28px;background:#0EA5E9;border-radius:50%;display:flex;align-items:center;justify-content:center;font-family:'Oswald',sans-serif;font-size:14px;font-weight:700;color:#fff;flex-shrink:0}
.z-name{font-family:'Oswald',sans-serif;font-size:15px;color:#fff;text-transform:uppercase;letter-spacing:0.5px;flex:1}
.z-count{font-family:'JetBrains Mono',monospace;font-size:12px;color:#38BDF8;font-weight:600}
.z-body{padding:10px 14px;font-size:14px;color:#4B5563;display:flex;justify-content:space-between}
.z-body b{color:#0A2540}

/* Empresas */
.emp-sec{margin-top:30px}
.emp-sec h3{font-family:'Oswald',sans-serif;font-size:22px;color:#0A2540;text-transform:uppercase;margin-bottom:18px;letter-spacing:0.5px}
.emp-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(320px,1fr));gap:18px}

/* Ficha */
.ficha{background:#fff;border:1.5px solid #D6CEC4;border-radius:4px;overflow:hidden;display:flex;flex-direction:column;transition:border-color 0.15s,box-shadow 0.15s}
.ficha:hover{border-color:#0EA5E9;box-shadow:0 4px 16px rgba(14,165,233,0.12)}
.f-tab{background:#0A2540;padding:9px 14px;display:flex;align-items:center;gap:8px}
.f-ztag{background:#0EA5E9;color:#fff;font-family:'JetBrains Mono',monospace;font-size:10px;font-weight:700;padding:2px 8px;border-radius:2px;text-transform:uppercase}
.f-rating{margin-left:auto;color:#FCD34D;font-size:12px;font-family:'JetBrains Mono',monospace}
.f-body{padding:16px;flex:1;display:flex;flex-direction:column;gap:10px}
.f-nombre{font-family:'Oswald',sans-serif;font-size:21px;font-weight:600;color:#0A2540;line-height:1.2}
.f-ptag{display:inline-block;font-size:11px;padding:3px 10px;border-radius:10px;font-family:'JetBrains Mono',monospace;text-transform:uppercase;letter-spacing:0.3px;font-weight:600}
.tag-f{background:#DBEAFE;color:#1E40AF}.tag-c{background:#EDE9FE;color:#6D28D9}
.tag-i{background:#D1FAE5;color:#065F46}.tag-o{background:#F3F4F6;color:#374151}
.f-datos{border-top:1px dashed #D6CEC4;padding-top:10px;display:flex;flex-direction:column;gap:6px;font-size:13px;color:#4B5563;font-family:'JetBrains Mono',monospace}
.f-dato{display:flex;align-items:flex-start;gap:8px}
.f-dato a{color:#0A2540;text-decoration:none}.f-dato a:hover{text-decoration:underline}
.f-op{background:#EFF6FF;border-left:3px solid #0EA5E9;padding:10px 12px;font-size:13px;color:#1E40AF;line-height:1.55}
.f-op b{display:block;font-family:'JetBrains Mono',monospace;font-size:10px;text-transform:uppercase;letter-spacing:0.8px;color:#0EA5E9;margin-bottom:4px}
.f-foot{padding:12px 16px;border-top:1px solid #D6CEC4;display:flex;gap:8px}
.fbtn{flex:1;text-align:center;padding:10px;font-size:12px;font-family:'JetBrains Mono',monospace;text-transform:uppercase;letter-spacing:0.4px;border-radius:3px;cursor:pointer;text-decoration:none;display:flex;align-items:center;justify-content:center;gap:6px;transition:all 0.15s;border:none}
.fbtn.p{background:#0A2540;color:#fff}.fbtn.p:hover{background:#0EA5E9}
.fbtn.s{background:transparent;color:#0A2540;border:1.5px solid #D6CEC4}.fbtn.s:hover{border-color:#0A2540}

/* Modal */
.mo{position:fixed;inset:0;background:rgba(10,37,64,0.75);display:flex;align-items:center;justify-content:center;z-index:1000;padding:20px}
.mb{background:#fff;max-width:560px;width:100%;max-height:85vh;overflow-y:auto;border-radius:6px;box-shadow:0 20px 60px rgba(0,0,0,0.4)}
.mh{background:#0A2540;color:#fff;padding:20px 24px;display:flex;align-items:center;justify-content:space-between}
.mh h3{font-family:'Oswald',sans-serif;font-size:20px;text-transform:uppercase;letter-spacing:0.4px}
.mc-btn{background:none;border:none;color:#fff;cursor:pointer;font-size:28px;line-height:1}
.mbody{padding:24px}
.msec{margin-bottom:20px}.msec:last-child{margin-bottom:0}
.msec h4{font-family:'JetBrains Mono',monospace;font-size:11px;text-transform:uppercase;letter-spacing:1px;color:#0EA5E9;margin-bottom:8px}
.msec p{font-size:15px;line-height:1.7;color:#1F2937}
.sbox{background:#F8FAFF;border-left:3px solid #0EA5E9;padding:16px;font-size:14px;line-height:1.75;color:#1F2937;font-style:italic}

/* FOOTER */
footer{background:#0A2540;border-top:4px solid #0EA5E9;padding:30px 4%;display:flex;align-items:center;justify-content:space-between;min-height:120px}
.ft-izq .ft1{font-family:'Oswald',sans-serif;font-size:32px;font-weight:700;color:#fff;letter-spacing:3px;text-transform:uppercase;line-height:1}
.ft-izq .ft2{font-family:'JetBrains Mono',monospace;font-size:16px;color:#38BDF8;margin-top:8px;letter-spacing:1px;font-weight:600}
.ft-der{display:flex;flex-direction:column;align-items:flex-end;gap:10px;justify-content:center}
.ft-der .ft3{font-family:'JetBrains Mono',monospace;font-size:14px;color:rgba(255,255,255,0.7);letter-spacing:0.5px;text-align:right}
.ft-der img{height:110px;display:block}

@media(max-width:700px){
  header{flex-wrap:wrap;gap:10px;padding:14px 4%}
  .h-logo img{height:56px}
  .h-sep{height:50px}
  .h-titles h1{font-size:18px;gap:8px}
  .h-rombo{width:24px;height:24px}
  .h-rombo svg{width:12px;height:12px}
  .h-sub{font-size:12px;margin-top:6px;letter-spacing:1px}
  .h-btns{margin-left:0;gap:8px}
  .h-btn{padding:10px 18px;font-size:14px}
  .searchbar{flex-direction:column;gap:12px}
  .sf input,.sf select{min-width:0;width:100%}
  .btn-buscar{width:100%;justify-content:center}
  footer{flex-direction:column;gap:20px;text-align:center;padding:24px 4%}
  .ft-der{align-items:center}
  .ft-der .ft3{text-align:center}
}
</style>
</head>

function dist(a,b,c,d){
  const R=6371,dLa=(c-a)*Math.PI/180,dLo=(d-b)*Math.PI/180;
  const x=Math.sin(dLa/2)**2+Math.cos(a*Math.PI/180)*Math.cos(c*Math.PI/180)*Math.sin(dLo/2)**2;
  return R*2*Math.atan2(Math.sqrt(x),Math.sqrt(1-x));
}
function cluster(emps,r=25){
  const vis=new Set(),cls=[];
  emps.forEach((e,i)=>{
    if(vis.has(i)) return;
    const c=[e]; vis.add(i); let ch=true;
    while(ch){ch=false;emps.forEach((o,j)=>{if(vis.has(j)) return;if(c.some(x=>dist(x.lat,x.lng,o.lat,o.lng)<=r)){c.push(o);vis.add(j);ch=true;}});}
    cls.push(c);
  });
  return cls.sort((a,b)=>b.length-a.length);
}
function zoneName(cl){
  const locs=cl.map(e=>{const p=e.dir.split(",").map(s=>s.trim());return p.length>=2?p[p.length-3]||p[1]:p[0];}).filter(Boolean);
  const cnt={};locs.forEach(l=>cnt[l]=(cnt[l]||0)+1);
  const top=Object.entries(cnt).sort((a,b)=>b[1]-a[1])[0];
  return top?top[0]:"Zona";
}
function perfil(n,t){
  const nm=n.toLowerCase(),tp=(t||[]).join(" ").toLowerCase();
  if(nm.includes("flexo")||nm.includes("flex")||tp.includes("flexo")) return "flexo";
  if(nm.includes("packaging")||nm.includes("envases")||nm.includes("convert")) return "convertidor";
  if(nm.includes("imprenta")||nm.includes("grafica")||nm.includes("offset")||nm.includes("impresion")) return "imprenta";
  if(nm.includes("alimen")||nm.includes("arroz")||nm.includes("snack")) return "alimentos";
  return "otro";
}

  function initMap(){

  const buscar=useCallback(async()=>{
    if(!zona.trim()){setErr("Ingresá una zona o provincia.");return;}

    setErr("");setLoading(true);setDone(false);setEmps([]);setCls([]);setSelZona(null);

      const loc=await geocode(zona);

      for(const q of cfg.queries){const r=await search(q+" en "+zona,loc);all=all.concat(r);}
      const seen=new Set(),uniq=all.filter(r=>{if(seen.has(r.place_id))return false;seen.add(r.place_id);return true;});

  },[zona,rubro,radio]);

  function renderMap(clustered){
    if(!mapInst.current) return;
    markers.current.forEach(m=>m.setMap(null));markers.current=[];
    const bounds=new google.maps.LatLngBounds();
    clustered.forEach((cl,i)=>{
      const color=COLORS[i%COLORS.length];
      cl.forEach(e=>{
        const mk=new google.maps.Marker({position:{lat:e.lat,lng:e.lng},map:mapInst.current,title:e.nombre,
          label:{text:String(i+1),color:"#fff",fontSize:"10px",fontWeight:"700"},
          icon:{path:google.maps.SymbolPath.CIRCLE,fillColor:color,fillOpacity:1,strokeColor:"#fff",strokeWeight:2,scale:12}});
        bounds.extend(mk.getPosition());markers.current.push(mk);
      });
    });
    if(!bounds.isEmpty()) mapInst.current.fitBounds(bounds);
  }

  function selZonaFn(i){
    setSelZona(i);
    if(mapInst.current&&cls[i]){
      const cl=cls[i];const lat=cl.reduce((s,e)=>s+e.lat,0)/cl.length,lng=cl.reduce((s,e)=>s+e.lng,0)/cl.length;
      mapInst.current.panTo({lat,lng});mapInst.current.setZoom(11);
    }
  }

  function csvExport(){

    a.download=`prospeccion-${zona.replace(/\s+/g,"-")}.csv`;a.click();
  }

  const shown=selZona!==null&&cls[selZona]?cls[selZona]:emps;
  const PTAGS={flexo:"tag-f",convertidor:"tag-c",imprenta:"tag-i",alimentos:"tag-o",otro:"tag-o"};
  const PLABS={flexo:"Flexografía",convertidor:"Convertidor",imprenta:"Imprenta",alimentos:"Alimenticia",otro:"Industrial"};

  return h("div",{id:"root"},
    h("header",null,
      h("div",{className:"h-logo"},h("img",{src:PAL_LOGO,alt:"PAL SRL"})),
      h("div",{className:"h-sep"}),
      h("div",{className:"h-titles"},
        h("h1",null,"Sistema de Prospección Territorial",
          h("div",{className:"h-rombo"},
            h("svg",{viewBox:"0 0 24 24",fill:"none",stroke:"#fff",strokeWidth:"2.5"},
              h("path",{d:"M21 10c0 7-9 13-9 13s-9-6-9-13a9 9 0 0 1 18 0z"}),
              h("circle",{cx:"12",cy:"10",r:"3"})))),
        h("div",{className:"h-sub"},"Fotopolímeros · CTP · Insumos Gráficos")),
      h("div",{className:"h-btns"},
        h("button",{className:"h-btn",onClick:()=>document.querySelector(".zones-col")?.scrollIntoView({behavior:"smooth"})},"ZONAS"),
        h("button",{className:"h-btn",onClick:()=>document.querySelector(".emp-sec")?.scrollIntoView({behavior:"smooth"})},"EMPRESAS"))),

    h("div",{className:"searchbar"},
      h("div",{className:"sf"},h("label",null,"Provincia / Zona"),h("input",{type:"text",placeholder:"Ej: Entre Ríos, Provincia de Buenos Aires...",value:zona,onChange:e=>setZona(e.target.value),onKeyDown:e=>e.key==="Enter"&&buscar()})),
      h("div",{className:"sf"},h("label",null,"Rubro a buscar"),h("select",{value:rubro,onChange:e=>setRubro(e.target.value)},RUBROS.map(r=>h("option",{key:r.value,value:r.value},r.label)))),
      h("div",{className:"sf sm"},h("label",null,"Radio (km)"),h("input",{type:"number",min:5,max:100,value:radio,onChange:e=>setRadio(e.target.value)})),
      h("button",{className:"btn-buscar",onClick:buscar,disabled:loading},loading?"Buscando...":"🔍 BUSCAR EMPRESAS")),

    h("main",null,
      err&&h("div",{className:"err"},err),
      loading&&h("div",{className:"loading"},h("div",{className:"loading-bar"},h("span")),h("p",null,"Recorriendo el mapa...")),
      !loading&&!done&&h("div",{className:"empty"},
        h("svg",{viewBox:"0 0 24 24",fill:"none",stroke:"currentColor",strokeWidth:"1.5"},h("circle",{cx:"12",cy:"12",r:"10"}),h("polygon",{points:"16.24 7.76 14.12 14.12 7.76 16.24 9.88 9.88 16.24 7.76"})),
        h("h2",null,"Planificá tu próxima recorrida"),
        h("p",null,"Ingresá una provincia o zona y el rubro que buscás. El sistema va a agrupar las empresas en zonas recorribles en una jornada, con ficha y guion de venta para cada una.")),
      !loading&&done&&emps.length===0&&!err&&h("div",{className:"empty"},h("h2",null,"Sin resultados"),h("p",null,"No se encontraron empresas. Probá con otra zona o rubro.")),
      !loading&&emps.length>0&&h("div",null,
        h("div",{className:"res-hdr"},
          h("h2",null,h("b",null,emps.length)," empresas en ",h("b",null,cls.length)," zonas"),
          h("button",{className:"btn-csv",onClick:csvExport},"⬇ Exportar CSV")),
        h("div",{className:"res-layout"},
          h("div",{className:"map-box"},h("div",{id:"map",ref:mapRef}),
            h("div",{className:"map-legend"},cls.slice(0,4).map((cl,i)=>h("div",{key:i,className:"leg-item"},h("span",{className:"leg-dot",style:{background:COLORS[i%COLORS.length]}}),`Zona ${i+1} — ${zoneName(cl)}`)))),
          h("div",{className:"zones-col"},cls.map((cl,i)=>h("div",{key:i,className:`z-card${selZona===i?" on":""}`,onClick:()=>selZonaFn(i)},
            h("div",{className:"z-hdr"},h("div",{className:"z-num"},i+1),h("div",{className:"z-name"},zoneName(cl)),h("div",{className:"z-count"},cl.length+" emp.")),
            h("div",{className:"z-body"},h("span",null,cl[0]?.dir.split(",").slice(-2,-1)[0]?.trim()||""),h("b",null,cl.length+" candidatas")))))),
        h("div",{className:"emp-sec"},

          h("div",{className:"emp-grid"},shown.map((e,i)=>h("div",{key:i,className:"ficha"},
            h("div",{className:"f-tab"},h("span",{className:"f-ztag"},`Zona ${(selZona!==null?selZona:cls.findIndex(c=>c.includes(e)))+1}`),e.rating&&h("span",{className:"f-rating"},`⭐ ${e.rating}`)),
            h("div",{className:"f-body"},
              h("div",{className:"f-nombre"},e.nombre),
              h("span",{className:`f-ptag ${PTAGS[e.perf]||"tag-o"}`},PLABS[e.perf]||"Industrial"),
              h("div",{className:"f-datos"},

                e.tel&&h("div",{className:"f-dato"},"📞 ",h("a",{href:`tel:${e.tel}`},e.tel)),
                e.web&&h("div",{className:"f-dato"},"🌐 ",h("a",{href:e.web,target:"_blank"},e.web.replace(/^https?:\/\//,"").replace(/\/$/,"")))),
